<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapdragon - TikTok Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)), 
                  url('https://files.catbox.moe/63irsr.jpeg') center/cover no-repeat fixed;
      min-height: 100vh;
      color: #2c2c2c;
    }

    .glass {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md mx-auto">

      <!-- Header -->
      <div class="flex flex-col items-center mb-8">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center shadow-md">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
              <path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-4.245V2h-3.445v13.672a2.896 2.896 0 0 1-5.201 1.743l-.002-.001.002.001a2.895 2.895 0 0 1 3.183-4.51v-3.5a6.329 6.329 0 0 0-5.394 10.128 6.33 6.33 0 0 0 10.818-4.605V8.687a8.182 8.182 0 0 0 4.81 1.514V6.686z"/>
            </svg>
          </div>
          <h1 class="text-4xl font-bold tracking-tighter text-white drop-shadow-md">Snapdragon</h1>
        </div>
        <p class="text-white/90 text-sm mt-1 drop-shadow">TikTok Downloader Kontol</p>
      </div>

      <!-- Main Card -->
      <div class="glass rounded-3xl p-7">
        
        <p class="text-center text-gray-700 mb-6 font-medium">Download Video TikTok tanpa watermark • HD </p>

        <!-- Input -->
        <div class="mb-6">
          <div class="flex gap-2">
            <input 
              type="text" 
              id="urlInput"
              placeholder="Paste link TikTok sini kontol..."
              class="flex-1 bg-white border border-gray-200 rounded-2xl px-5 py-4 focus:border-pink-400 focus:outline-none transition-all text-sm">
            
            <button onclick="pasteFromClipboard()" 
                    class="bg-white border border-gray-300 hover:bg-gray-50 px-5 rounded-2xl transition-all">
              <i class="fa-solid fa-paste"></i>
            </button>
            
            <button onclick="downloadVideo()"
                    class="bg-black hover:bg-zinc-800 text-white px-6 rounded-2xl transition-all">
              <i class="fa-solid fa-download"></i>
            </button>
          </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden text-center py-10">
          <div class="w-11 h-11 border-4 border-gray-300 border-t-pink-500 rounded-full animate-spin mx-auto"></div>
          <p class="text-gray-700 mt-4 text-sm font-medium">Lagi nyari video tanpa wm anjir... Sabar babi</p>
        </div>

        <!-- Result -->
        <div id="result" class="hidden">
          <div class="bg-white rounded-3xl overflow-hidden mb-6 border border-gray-100 shadow">
            <video id="preview" controls class="w-full rounded-3xl"></video>
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            <a id="downloadVideoBtn" 
               class="flex items-center justify-center gap-2 bg-black text-white py-4 rounded-2xl font-medium hover:bg-zinc-800 transition-all">
              <i class="fa-solid fa-video"></i>
              <span>Video HD </span>
            </a>
            <a id="downloadAudioBtn" 
               class="flex items-center justify-center gap-2 bg-white border border-gray-300 py-4 rounded-2xl font-medium hover:bg-gray-50 transition-all">
              <i class="fa-solid fa-music"></i>
              <span>Audio Only</span>
            </a>
          </div>
        </div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-2xl p-4 text-center text-sm font-medium">
          ❌ Bukan link TikTok kontol! Paste yang bener anjing.
        </div>
      </div>

      <!-- Tombol Download Besar -->
      <div class="text-center mt-6">
        <button onclick="downloadVideo()" 
                class="inline-flex items-center gap-2 bg-white text-black hover:bg-gray-100 px-8 py-4 rounded-2xl text-base font-bold shadow-md transition-all">
          <i class="fa-solid fa-download"></i>
          DOWNLOAD
        </button>
      </div>

      <p class="text-center text-xs text-white/70 mt-8 drop-shadow">Snapdragon • Downloader Tanpa wm</p>
    </div>
  </div>

  <script>
    const API_KEY = "ISI_API_KEY_KAMU_DISINI";

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
        if (text.includes("tiktok.com")) {
          downloadVideo();
        }
      } catch (err) {
        alert("Gagal ngambil clipboard kontol, paste manual aja babi.");
      }
    }

    async function downloadVideo() {
      const url = document.getElementById('urlInput').value.trim();
      
      if (!url) {
        alert("Link TikToknya mana anjing?!");
        return;
      }
      if (!url.includes("tiktok.com")) {
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      loading.classList.remove('hidden');
      result.classList.add('hidden');
      error.classList.add('hidden');

      try {
        const res = await fetch('https://tiktok-video-downloader-api-no-watermark.p.rapidapi.com/download', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'X-RapidAPI-Key': API_KEY,
            'X-RapidAPI-Host': 'tiktok-video-downloader-api-no-watermark.p.rapidapi.com'
          },
          body: JSON.stringify({ url: url })
        });

        const data = await res.json();
        const videoUrl = data.video?.[0] || data.data?.video || data.download_url;

        if (videoUrl) {
          document.getElementById('preview').src = videoUrl;
          document.getElementById('downloadVideoBtn').href = videoUrl;
          document.getElementById('downloadVideoBtn').download = `snapdragon_${Date.now()}.mp4`;
          result.classList.remove('hidden');
          
          setTimeout(() => {
            alert("✅ Video udah jadi kontol! Langsung download aja anjir.");
          }, 600);
        } else {
          throw new Error();
        }
      } catch (e) {
        document.getElementById('error').classList.remove('hidden');
        alert("Gagal bro, API lagi ngambek babi.");
      } finally {
        loading.classList.add('hidden');
      }
    }

    document.getElementById('urlInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') downloadVideo();
    });
  </script>
</body>
</html>
